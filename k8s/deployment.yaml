apiVersion: apps/v1
kind: Deployment
metadata:
  name: graceful-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: graceful-app
  template:
    metadata:
      labels:
        app: graceful-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: graceful-app
          image: graceful-app:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              value: "module"
            - name: SHUTDOWN_TIMEOUT_SECONDS
              value: "25"
            - name: LOG_FORMAT
              value: "json"
            - name: READY_PATH
              value: "/ready"
            - name: SHUTDOWN_PATH
              value: "/shutdown"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 2
            failureThreshold: 1
          lifecycle:
            preStop:
              httpGet:
                path: /shutdown
                port: 8080
